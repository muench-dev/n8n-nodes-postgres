name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: pnpm

      - name: Install dependencies
        run: 'pnpm install --frozen-lockfile'

      - name: Run lint
        run: 'pnpm lint'

      - name: Run tests
        run: 'pnpm test'

      - name: Run build
        run: 'pnpm build'
